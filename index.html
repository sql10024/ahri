<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아리벳</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Orbitron:wght@700;800&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; font-family: "Montserrat", sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: url("assets/sakura-bg.png") center center / cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 72% 34%, rgba(102, 45, 155, 0.18), transparent 36%),
        radial-gradient(circle at 15% 82%, rgba(0, 84, 180, 0.22), transparent 42%),
        linear-gradient(135deg,
          rgba(5, 10, 38, 0.58) 0%,
          rgba(27, 18, 70, 0.48) 42%,
          rgba(9, 38, 98, 0.40) 100%
        );
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(2, 4, 18, 0.28), transparent 38%, rgba(3, 5, 20, 0.18)),
        radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.28) 100%);
    }

    #loginWrap {
      display: block;
      position: relative;
      z-index: 2;
    }

    .card {
      width: min(400px, calc(100vw - 34px));
      padding: 28px 30px 24px;
      border-radius: 26px;
      position: relative;
      z-index: 2;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(8, 16, 48, 0.56), rgba(7, 9, 28, 0.40)),
        radial-gradient(circle at 18% 10%, rgba(83, 154, 255, 0.17), transparent 34%),
        radial-gradient(circle at 92% 0%, rgba(164, 87, 255, 0.15), transparent 36%);
      backdrop-filter: blur(20px) saturate(175%);
      -webkit-backdrop-filter: blur(20px) saturate(175%);
      border: 1px solid rgba(157, 194, 255, 0.56);
      box-shadow:
        0 26px 72px rgba(0, 0, 0, 0.44),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset,
        0 0 38px rgba(45, 126, 255, 0.30),
        0 0 70px rgba(150, 75, 255, 0.16);
      clip-path: polygon(0 18px, 18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%);
    }

    .card::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(74, 166, 255, 0.95), rgba(168, 98, 255, 0.82), transparent);
      opacity: 0.95;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 20px;
      border: 1px solid rgba(130, 170, 255, 0.22);
      pointer-events: none;
    }

    .title {
      margin-bottom: 26px;
      cursor: pointer;
      user-select: none;
      position: relative;
      min-height: 72px;
      display: block;
      text-align: center;
      font-family: "Noto Serif KR", "Orbitron", "Montserrat", sans-serif;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 0.5px;
      white-space: nowrap;
      color: #ff3f9d;
      text-shadow:
        0 0 4px rgba(255, 225, 245, 0.96),
        0 0 14px rgba(255, 65, 165, 0.82),
        0 0 30px rgba(255, 30, 140, 0.58),
        0 0 46px rgba(170, 70, 255, 0.34);
      animation: glassTitleGlow 2.6s ease-in-out infinite;
    }

    .title span {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: block;
    }

    .title-logo {
      display: none;
    }

    @keyframes glassTitleGlow {
      0%, 100% { opacity: 0.94; filter: drop-shadow(0 0 4px rgba(112, 170, 255, 0.38)); }
      50% { opacity: 1; filter: drop-shadow(0 0 16px rgba(80, 150, 255, 0.70)); }
    }

    .input,
    .modal-input {
      width: 100%;
      padding: 16px 18px 14px;
      border: 0;
      border-bottom: 2px solid rgba(90, 157, 255, 0.72);
      border-radius: 0;
      outline: none;
      font-size: 14px;
      font-weight: 900;
      color: #ffffff;
      background:
        linear-gradient(90deg, rgba(37, 70, 145, 0.22), rgba(18, 26, 72, 0.14)),
        rgba(3, 8, 28, 0.28);
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 10px 22px rgba(0, 0, 0, 0.18);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.34);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .input { margin-bottom: 15px; }

    .input:focus,
    .modal-input:focus {
      border-bottom-color: rgba(213, 231, 255, 0.98);
      background:
        linear-gradient(90deg, rgba(57, 115, 255, 0.25), rgba(117, 79, 255, 0.18)),
        rgba(4, 13, 40, 0.34);
      box-shadow:
        0 0 0 1px rgba(116, 170, 255, 0.18) inset,
        0 0 26px rgba(76, 145, 255, 0.28),
        0 12px 28px rgba(0, 0, 0, 0.26);
      transform: translateY(-1px);
    }

    .input::placeholder,
    .modal-input::placeholder { color: rgba(230, 238, 255, 0.68); }

    .btn {
      flex: 1;
      padding: 14px 12px;
      border: 1px solid rgba(177, 207, 255, 0.58);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 900;
      color: #ffffff;
      background:
        linear-gradient(135deg, rgba(116, 58, 255, 0.98), rgba(28, 116, 255, 0.94));
      box-shadow:
        0 16px 34px rgba(37, 91, 255, 0.32),
        0 0 28px rgba(98, 105, 255, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.38);
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.42);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .signup-btn {
      background: linear-gradient(135deg, rgba(30, 139, 255, 0.98), rgba(117, 76, 255, 0.92));
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .btn:hover,
    .modal-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.10);
    }

    .login-btn { margin-bottom: 0; }
    .signup-btn { margin-top: 0; }

    .status-message {
      min-height: 18px;
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
    }

    .status-message.error { color: #ffe3e3; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 10;
      background: rgba(1, 5, 22, 0.68);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-overlay.show { display: flex; }

    .modal-box {
      width: min(390px, calc(100vw - 34px));
      padding: 32px 28px 26px;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 0%, rgba(94, 156, 255, 0.20), transparent 40%),
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(25, 24, 73, 0.46)),
        rgba(5, 9, 30, 0.42);
      backdrop-filter: blur(22px) saturate(175%);
      -webkit-backdrop-filter: blur(22px) saturate(175%);
      border: 1px solid rgba(200,215,255,0.60);
      box-shadow:
        0 28px 76px rgba(0,0,0,0.50),
        0 0 34px rgba(80,120,255,0.30),
        inset 0 1px 0 rgba(255,255,255,0.34);
    }

    .modal-title {
      margin: 0 0 18px;
      text-align: center;
      font-family: "Noto Serif KR", "Orbitron", "Montserrat", sans-serif;
      font-size: 31px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #f4f7ff;
      text-shadow:
        0 0 5px rgba(255,255,255,0.90),
        0 0 15px rgba(132,198,255,0.70),
        0 0 28px rgba(88,125,255,0.48),
        0 0 40px rgba(178,111,255,0.32);
    }

    .error-text {
      min-height: 18px;
      margin: 0 0 12px;
      font-size: 12px;
      text-align: center;
      color: #ffe3e3;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px 12px;
      border: 1px solid rgba(198,211,255,0.58);
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      color: #ffffff;
      background: linear-gradient(135deg, rgba(102, 70, 255, 0.88), rgba(36, 116, 255, 0.76));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), 0 10px 24px rgba(42,67,255,0.20);
      text-shadow: 0 1px 8px rgba(0,0,0,0.34);
    }

    .banner-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.68);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .banner-grid {
      width: min(94vw, 1100px);
      max-height: 92vh;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      overflow-y: auto;
      padding: 4px;
    }

    .banner-item {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: rgba(5, 10, 35, 0.72);
      border: 1px solid rgba(170, 195, 255, 0.34);
      box-shadow:
        0 0 30px rgba(120, 80, 255, 0.30),
        0 0 60px rgba(40, 120, 255, 0.14),
        0 18px 54px rgba(0, 0, 0, 0.42);
      animation: bannerFade 0.25s ease;
    }

    .banner-item.hidden {
      display: none;
    }

    .banner-control {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .banner-hide-today,
    .banner-close {
      pointer-events: auto;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 999px;
      cursor: pointer;
      color: #ffffff;
      background: rgba(5, 10, 28, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      font-weight: 900;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .banner-hide-today {
      padding: 7px 11px;
      font-size: 12px;
      letter-spacing: -0.2px;
    }

    .banner-close {
      width: 30px;
      height: 30px;
      padding: 0;
      font-size: 17px;
      line-height: 1;
    }

    .banner-hide-today:hover,
    .banner-close:hover {
      transform: translateY(-1px);
      filter: brightness(1.12);
    }

    .banner-item img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    @keyframes bannerFade {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 760px) {
      .banner-overlay {
        align-items: flex-start;
        padding: 14px;
        overflow-y: auto;
      }

      .banner-grid {
        grid-template-columns: 1fr;
        width: min(96vw, 520px);
        max-height: none;
      }

      .banner-hide-today {
        font-size: 11px;
        padding: 6px 10px;
      }

      .banner-close {
        width: 28px;
        height: 28px;
      }
    }

    /* Mobile-only background visibility adjustment: 기능 변경 없음 */
    @media (max-width: 520px) {
      body {
        align-items: flex-start;
        padding-top: 118px;
      }

      #loginWrap {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .card {
        width: calc(100vw - 58px);
        padding: 24px 21px 22px;
        transform: translateY(18px);
        background:
          linear-gradient(180deg, rgba(8, 16, 48, 0.42), rgba(7, 9, 28, 0.28)),
          radial-gradient(circle at 18% 10%, rgba(83, 154, 255, 0.16), transparent 34%),
          radial-gradient(circle at 92% 0%, rgba(164, 87, 255, 0.14), transparent 36%);
        backdrop-filter: blur(18px) saturate(165%);
        -webkit-backdrop-filter: blur(18px) saturate(165%);
      }

      .title {
        min-height: 68px;
        font-size: 34px;
        margin-bottom: 18px;
      }

      .input,
      .modal-input {
        padding: 14px 15px 12px;
      }

    }

  </style>
</head>
<body>
  <div id="loginWrap">

  <div class="card">
    <div class="title" onclick="window.location.reload()">
      <span>아리벳</span>
    </div>
    <input class="input" id="loginUserId" type="text" placeholder="ID" />
    <input class="input" id="loginPassword" type="password" placeholder="password" />
    <div class="auth-actions">
      <button class="btn login-btn" id="loginBtn" type="button">로그인</button>
      <button class="btn signup-btn" id="signupBtn" type="button">회원가입</button>
    </div>
    <p class="status-message" id="loginStatusMessage"></p>
  </div>

  <div class="modal-overlay" id="codeModal">
    <div class="modal-box">
      <h2 class="modal-title">가입코드</h2>
      <input class="modal-input" id="signupCodeInput" type="text" autocomplete="off" />
      <p class="error-text" id="codeError"></p>
      <div class="modal-actions">
        <button class="modal-btn" id="cancelCodeBtn" type="button">취소</button>
        <button class="modal-btn" id="confirmCodeBtn" type="button">확인</button>
      </div>
    </div>
  </div>

  </div>



  <div id="bannerOverlay" class="banner-overlay">
    <div class="banner-grid">
      <div class="banner-item" data-banner="1">
        <div class="banner-control">
          <button class="banner-hide-today" type="button">오늘 하루 보지 않음</button>
          <button class="banner-close" type="button" aria-label="배너 닫기">×</button>
        </div>
        <img src="assets/banner1.png" alt="신규 첫충 40% 이벤트 배너" />
      </div>

      <div class="banner-item" data-banner="2">
        <div class="banner-control">
          <button class="banner-hide-today" type="button">오늘 하루 보지 않음</button>
          <button class="banner-close" type="button" aria-label="배너 닫기">×</button>
        </div>
        <img src="assets/banner2.png" alt="신규회원 입금 플러스 배너" />
      </div>

      <div class="banner-item" data-banner="3">
        <div class="banner-control">
          <button class="banner-hide-today" type="button">오늘 하루 보지 않음</button>
          <button class="banner-close" type="button" aria-label="배너 닫기">×</button>
        </div>
        <img src="assets/banner3.png" alt="통장협박 관련 경고 배너" />
      </div>

      <div class="banner-item" data-banner="4">
        <div class="banner-control">
          <button class="banner-hide-today" type="button">오늘 하루 보지 않음</button>
          <button class="banner-close" type="button" aria-label="배너 닫기">×</button>
        </div>
        <img src="assets/banner4.png" alt="가입 승인 10만원 지급 배너" />
      </div>
    </div>
  </div>

  <script>
    const signupBtn = document.getElementById("signupBtn");
    const codeModal = document.getElementById("codeModal");
    const signupCodeInput = document.getElementById("signupCodeInput");
    const confirmCodeBtn = document.getElementById("confirmCodeBtn");
    const cancelCodeBtn = document.getElementById("cancelCodeBtn");
    const codeError = document.getElementById("codeError");
    const loginUserId = document.getElementById("loginUserId");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const loginStatusMessage = document.getElementById("loginStatusMessage");

    const LOGIN_STATE_KEY = "shark_login_pending_state";
    let statusTimer = null;

    function openCodeModal() {
      codeModal.classList.add("show");
      codeError.textContent = "";
      signupCodeInput.value = "";
      window.setTimeout(() => signupCodeInput.focus(), 50);
    }

    function closeCodeModal() {
      codeModal.classList.remove("show");
      codeError.textContent = "";
      signupCodeInput.value = "";
    }

    async function checkSignupCode() {
      const enteredCode = signupCodeInput.value.trim();

      if (!enteredCode) {
        codeError.textContent = "코드를 입력해주세요.";
        return;
      }

      try {
        const response = await fetch("/api/verify-signup-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: enteredCode })
        });

        const result = await response.json();

        if (!response.ok || !result.ok) {
          codeError.textContent = result.message || "코드 확인에 실패했습니다.";
          return;
        }

        window.location.href = "signup.html";
      } catch (error) {
        codeError.textContent = "서버 연결 중 오류가 발생했습니다.";
      }
    }

    function setLoginStatus(text, isError = false) {
      loginStatusMessage.textContent = text;
      loginStatusMessage.className = isError ? "status-message error" : "status-message";
    }

    function updatePendingStatus() {
      const raw = localStorage.getItem(LOGIN_STATE_KEY);

      if (!raw) {
        setLoginStatus("");
        return;
      }

      try {
        const data = JSON.parse(raw);
        const startedAt = Number(data.startedAt || 0);

        if (!startedAt) {
          localStorage.removeItem(LOGIN_STATE_KEY);
          setLoginStatus("");
          return;
        }

        const elapsed = Date.now() - startedAt;
        const rejectAfter = 10 * 60 * 1000;

        if (elapsed >= rejectAfter) {
          setLoginStatus("가입 대기중입니다. /블랙조회 중/");
          return;
        }

        setLoginStatus("");

        if (statusTimer) {
          window.clearTimeout(statusTimer);
        }

        statusTimer = window.setTimeout(updatePendingStatus, rejectAfter - elapsed);
      } catch (error) {
        localStorage.removeItem(LOGIN_STATE_KEY);
        setLoginStatus("");
      }
    }

    async function handleLogin() {
      const userId = loginUserId.value.trim();
      const password = loginPassword.value;

      if (!userId || !password) {
        setLoginStatus("아이디와 비밀번호를 입력해주세요.", true);
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = "확인 중...";

        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: userId, password })
        });

        const result = await response.json();

        if (!response.ok || !result.ok) {
          setLoginStatus(result.message || "로그인에 실패했습니다.", true);
          return;
        }

        localStorage.setItem(LOGIN_STATE_KEY, JSON.stringify({
          userId,
          startedAt: Date.now()
        }));

        updatePendingStatus();
      } catch (error) {
        setLoginStatus("서버 연결 중 오류가 발생했습니다.", true);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "로그인";
      }
    }

    updatePendingStatus();

    signupBtn.addEventListener("click", openCodeModal);
    cancelCodeBtn.addEventListener("click", closeCodeModal);
    confirmCodeBtn.addEventListener("click", checkSignupCode);
    signupCodeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") checkSignupCode();
    });
    codeModal.addEventListener("click", (event) => {
      if (event.target === codeModal) closeCodeModal();
    });
    loginBtn.addEventListener("click", handleLogin);
    loginPassword.addEventListener("keydown", (event) => {
      if (event.key === "Enter") handleLogin();
    });

    updatePendingStatus();

    const bannerOverlay = document.getElementById("bannerOverlay");
    const bannerItems = document.querySelectorAll(".banner-item");
    const BANNER_HIDE_PREFIX = "ahribet_banner_hide_until_";

    function getBannerHideKey(bannerId) {
      return `${BANNER_HIDE_PREFIX}${bannerId}`;
    }

    function updateBannerOverlay() {
      if (!bannerOverlay) return;

      const visibleBannerCount = Array.from(bannerItems)
        .filter((item) => !item.classList.contains("hidden"))
        .length;

      if (visibleBannerCount === 0) {
        bannerOverlay.style.display = "none";
      }
    }

    function closeBannerItem(item) {
      if (!item) return;
      item.classList.add("hidden");
      updateBannerOverlay();
    }

    function hideBannerForToday(item) {
      if (!item) return;

      const bannerId = item.dataset.banner;
      const hideUntil = Date.now() + (24 * 60 * 60 * 1000);

      localStorage.setItem(getBannerHideKey(bannerId), String(hideUntil));
      closeBannerItem(item);
    }

    function initBannerGrid() {
      bannerItems.forEach((item) => {
        const bannerId = item.dataset.banner;
        const savedUntil = Number(localStorage.getItem(getBannerHideKey(bannerId)) || "0");

        if (savedUntil > Date.now()) {
          item.classList.add("hidden");
        } else if (savedUntil) {
          localStorage.removeItem(getBannerHideKey(bannerId));
        }

        const hideTodayBtn = item.querySelector(".banner-hide-today");
        const closeBtn = item.querySelector(".banner-close");

        if (hideTodayBtn) {
          hideTodayBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            hideBannerForToday(item);
          });
        }

        if (closeBtn) {
          closeBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            closeBannerItem(item);
          });
        }
      });

      updateBannerOverlay();
    }

    initBannerGrid();

  </script>
</body>
</html>
